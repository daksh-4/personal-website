<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essays - Daksh Mehta</title>
    <style>
        body {
            font-family: Verdana, Geneva, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #000;
            background-color: #f6f6ef;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        a {
            color: #000;
            text-decoration: underline;
        }
        
        a:hover {
            color: #666;
        }
        
        .nav {
            margin-bottom: 30px;
        }
        
        .nav a {
            margin-right: 15px;
        }
        
        .essay-list {
            list-style: none;
            padding: 0;
        }
        
        .essay-list li {
            margin-bottom: 12px;
        }
        
        .essay-date {
            color: #666;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #666;
        }
        
        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Essays</h1>
        
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        
        <hr>
        
        <ul id="essay-list" class="essay-list">
            <!-- Essays loaded dynamically from essays.json -->
        </ul>

        <h2 id="research-header" style="display: none; font-size: 16px; margin-top: 30px;">Research</h2>
        <ul id="research-list" class="essay-list">
            <!-- Research loaded dynamically from essays.json -->
        </ul>
        
        <h2 id="misc-header" style="display: none; font-size: 16px; margin-top: 30px;">Miscellaneous</h2>
        <ul id="misc-list" class="essay-list">
            <!-- Misc loaded dynamically from essays.json -->
        </ul>
        
        <hr>
        
        <div class="footer">
            &copy; 2026 Daksh Mehta
        </div>
    </div>

    <script>
        async function loadEssays() {
            try {
                const response = await fetch('essays.json');
                const essays = await response.json();
                const list = document.getElementById('essay-list');
                const researchList = document.getElementById('research-list');
                const researchHeader = document.getElementById('research-header');
                const miscList = document.getElementById('misc-list');
                const miscHeader = document.getElementById('misc-header');
                
                // Sort by date, newest first. Missing dates are treated as very old.
                essays.sort((a, b) => (b.date || '0000-00').localeCompare(a.date || '0000-00'));
                
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                                   'July', 'August', 'September', 'October', 'November', 'December'];
                
                if (!essays || essays.length === 0) {
                    const empty = document.createElement('li');
                    empty.textContent = 'No essays found.';
                    list.appendChild(empty);
                } else {
                    let hasMisc = false;
                    let hasResearch = false;
                    
                    essays.forEach(essay => {
                        const li = document.createElement('li');
                        const link = document.createElement('a');
                        link.href = essay.url;
                        link.textContent = essay.title;
                        li.appendChild(link);
                        
                        if (essay.date) {
                            const [year, month] = essay.date.split('-');
                            const dateSpan = document.createElement('span');
                            dateSpan.className = 'essay-date';
                            dateSpan.textContent = '- ' + monthNames[parseInt(month, 10) - 1] + ' ' + year;
                            li.appendChild(dateSpan);
                        }
                        
                        const cat = (essay.category || '').toLowerCase();
                        if (cat === 'miscellaneous') {
                            hasMisc = true;
                            miscList.appendChild(li);
                        } else if (cat === 'research') {
                            hasResearch = true;
                            researchList.appendChild(li);
                        } else {
                            list.appendChild(li);
                        }
                    });
                    
                    if (hasMisc) {
                        miscHeader.style.display = 'block';
                    }
                    if (hasResearch) {
                        researchHeader.style.display = 'block';
                    }
                }
            } catch (error) {
                console.log('Could not load essays.json');
            }
        }
        
        loadEssays();
    </script>
    <script data-goatcounter="https://daksh-4.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
